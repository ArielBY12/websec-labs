site_name: WebSec Labs
site_description: Level-based intentionally vulnerable web labs — OWASP Top 10 and beyond.
theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
  features:
    - navigation.sections
    - content.code.copy
markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
nav:
  - Home: index.md
  # Lab writeups are added here as they are completed, e.g.:
  # - Level 1:
  #   - SQL Injection: labs/01-sqli.md
